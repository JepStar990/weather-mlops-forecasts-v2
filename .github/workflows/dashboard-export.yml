name: Dashboard Data Export
on:
  schedule:
    - cron: "7 */6 * * *"   # every 6 hours at :07 (00:07, 06:07, 12:07, 18:07 UTC)
  workflow_dispatch: {}

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Export dashboard data from Neon
        run: python scripts/export_dashboard_data.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          PUBLIC_REPO_NAME: ${{ vars.PUBLIC_REPO_NAME }}

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard.json
          git diff --staged --quiet || git commit -m "chore: update dashboard data"
          git push
