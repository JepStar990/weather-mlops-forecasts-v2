name: ETL - Forecast Ingestion
on:
  schedule:
    - cron: "17 * * * *"   # hourly at :17 UTC
  workflow_dispatch: {}

jobs:
  etl:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install PostgreSQL client (psql)
      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql --version

      - run: pip install -r requirements.txt

      # Bootstrap DB schema with retry (Neon may be cold-starting)
      - name: Bootstrap schema
        run: |
          success=false
          for i in $(seq 1 5); do
            if psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f src/db/schema.sql; then
              success=true
              break
            fi
            echo "psql attempt $i failed; retrying in $((2**i))s..."
            sleep $((2**i))
          done
          if [ "$success" = false ]; then
            echo "psql failed after 5 attempts"
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Ingest vendor forecasts
        run: python -m src.jobs.job_ingest_forecasts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          VISUAL_CROSSING_API_KEY: ${{ secrets.VISUAL_CROSSING_API_KEY }}
          MET_NO_USER_AGENT: ${{ secrets.MET_NO_USER_AGENT }}
          NWS_USER_AGENT: ${{ secrets.NWS_USER_AGENT }}
          TARGET_LOCATIONS: ${{ vars.TARGET_LOCATIONS }}
          VARIABLES: ${{ vars.VARIABLES }}
          HORIZONS_HOURS: ${{ vars.HORIZONS_HOURS }}
